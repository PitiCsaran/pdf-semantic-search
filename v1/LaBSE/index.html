<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Semantic Search</title>
  <link rel="stylesheet" href="style.css" />
  <script src="./libs/pdf.min.js"></script>
  <script src="./libs/xlsx.full.min.js"></script>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <span class="app-title">PDF Semantic Search</span>
    <span class="model-badge" id="modelBadge">Loading model…</span>
  </div>
  <button class="btn-sessions" id="btnSessions">Sessions</button>
</header>

<!-- ── MAIN SPLIT LAYOUT ──────────────────────────────────── -->
<div class="main-layout">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- Upload + status -->
    <div class="upload-bar">
      <label class="btn-upload" title="Upload PDF">
        Upload PDF
        <input type="file" id="inputPdf" accept=".pdf" hidden />
      </label>
      <label class="btn-upload" title="Upload Excel">
        Upload Excel
        <input type="file" id="inputExcel" accept=".xlsx,.xls" hidden />
      </label>
      <button class="btn-template" id="btnTemplate">Template</button>
    </div>
    <div class="status-bar" id="statusBar">
      <span class="status-dot pending" id="statusDot"></span>
      <span id="statusText">Loading model, please wait…</span>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search slides…" disabled />
      <button id="btnSearch" disabled>Search</button>
    </div>

    <!-- Search history chips -->
    <div class="history-chips" id="historyChips"></div>

    <!-- Filters -->
    <div class="filter-bar">
      <label>Show:
        <select id="topNSelect">
          <option value="0">All</option>
          <option value="5">Top 5</option>
          <option value="10">Top 10</option>
          <option value="20">Top 20</option>
        </select>
      </label>
      <label class="score-label">
        Min Score: <span id="scoreVal">0%</span>
        <input type="range" id="scoreSlider" min="0" max="100" value="0" />
      </label>
    </div>

    <!-- Progress bar (hidden by default) -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
      <span class="progress-text" id="progressText">Embedding row 0 of 0</span>
    </div>

    <!-- Results table -->
    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Page</th>
            <th>Topic</th>
            <th>Detail</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <div class="no-results" id="noResults">No results. Upload files and run a search.</div>
    </div>
  </div>

  <!-- RIGHT PANEL — PDF viewer -->
  <div class="right-panel" id="rightPanel">
    <div class="pdf-toolbar">
      <button id="btnToggleThumbs" title="Toggle thumbnail panel">&#9776;</button>
      <span class="spacer"></span>
      <span id="pageInfo" class="page-info" title="Click to jump to page">&#8212; / &#8212;</span>
      <span class="spacer"></span>
      <button id="btnFullscreen" title="Full screen" disabled>&#9974;</button>
    </div>
    <div class="pdf-viewer-body" id="pdfViewerBody">
      <div class="thumbnail-strip" id="thumbnailStrip"></div>
      <div class="pdf-scroll-view" id="pdfScrollView">
        <div class="pdf-placeholder" id="pdfPlaceholder">PDF viewer — upload a PDF to begin</div>
      </div>
    </div>
  </div>
</div>

<!-- ── FULLSCREEN OVERLAY ─────────────────────────────────── -->
<div class="fullscreen-overlay" id="fullscreenOverlay" style="display:none">
  <div class="fs-toolbar">
    <button id="fsBtnPrev">&#9664;</button>
    <span id="fsPageInfo">&#8212; / &#8212;</span>
    <button id="fsBtnNext">&#9654;</button>
    <span class="spacer"></span>
    <button id="fsBtnClose">&#x2715; Exit Full Screen</button>
  </div>
  <div class="fs-canvas-wrap">
    <canvas id="fsCanvas"></canvas>
  </div>
</div>

<!-- ── SESSIONS MODAL ─────────────────────────────────────── -->
<div class="modal-overlay" id="sessionsModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span>Sessions</span>
      <button class="modal-close" id="btnCloseModal">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="session-actions">
        <button id="btnSetFolder">Set Session Folder</button>
        <span class="folder-hint" id="folderHint">No folder selected</span>
      </div>
      <div id="sessionList" class="session-list">
        <p class="session-empty">No sessions found. Set a session folder first.</p>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────── -->
<div class="toast" id="toast" style="display:none"></div>

<script type="module" src="app.js"></script>
</body>
</html>
